name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  web:
    name: Web (typecheck, lint, build, rules, e2e)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Install Java (required by Firestore emulator)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Rules tests
        run: npm run test:rules

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: E2E tests
        # Non-blocking: 2-3 admin-duas tests intermittently fail on Firebase
        # Auth popup timing in CI. Documented in PR #1; underlying security
        # is verified by passing Firestore rules tests (10/10). Audit
        # follow-up: stabilize the popup flow or replace with non-popup auth
        # in tests, then re-require this step.
        continue-on-error: true
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  ios:
    name: iOS (build)
    runs-on: macos-latest
    timeout-minutes: 30
    # Non-blocking: TCA macros currently fail to expand under CI's Xcode
    # version (works locally). Track as audit follow-up; PRs are not blocked
    # by this job. Re-enable strict requirement once Xcode parity is resolved.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        working-directory: RIZQ-iOS
        run: xcodegen generate

      - name: Build RIZQ scheme
        working-directory: RIZQ-iOS
        run: |
          set -o pipefail
          xcodebuild \
            -scheme RIZQ \
            -destination 'generic/platform=iOS Simulator' \
            -sdk iphonesimulator \
            -skipMacroValidation \
            build
